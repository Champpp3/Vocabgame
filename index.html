                            <div className="space-y-6">
                                <input className="w-full p-5 bg-slate-900/50 rounded-2xl outline-none font-bold focus:ring-2 ring-red-500 transition-all text-center border border-white/5 text-xl" placeholder="ใส่ชื่อของคุณ" value={playerName} onChange={e => setPlayerName(e.target.value)}/>
                                <p className="text-slate-500 text-center text-xs font-bold uppercase tracking-widest">คำศัพท์ครบ 395 คำ พร้อมทดสอบ!</p>
                                <button onClick={startGame} className="w-full py-5 bg-gradient-to-r from-red-600 to-orange-500 text-white rounded-3xl font-black text-2xl shadow-xl hover:brightness-110 btn-bounce uppercase tracking-widest">Start Play</button>
                            </div>
                        </div>
                    )}

                    {/* MODAL: INFO */}
                    {showInfo && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4" onClick={() => setShowInfo(false)}>
                            <div className="w-full max-w-sm glass-dark p-8 rounded-[2.5rem] text-center border border-blue-500/30" onClick={e => e.stopPropagation()}>
                                <div className="w-16 h-16 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-400 text-3xl font-black">?</div>
                                <h3 className="text-2xl font-black text-white mb-2">Quiz Info</h3>
                                <p className="text-slate-300 leading-relaxed">
                                    Quiz นี้รวบรวมคำศัพท์จาก Stem ทั้งหมด 395 คำ <br/>
                                    <span className="text-blue-400 font-bold">ใช้ Gemini ทำ</span>
                                </p>
                                <button onClick={() => setShowInfo(false)} className="mt-8 w-full py-3 bg-slate-800 rounded-xl font-bold text-white hover:bg-slate-700 transition-all">CLOSE</button>
                            </div>
                        </div>
                    )}

                    {/* MODAL: LEADERBOARD */}
                    {showRanking && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-md p-4" onClick={() => setShowRanking(false)}>
                            <div className="w-full max-w-md glass-dark rounded-[3.5rem] overflow-hidden border border-white/10" onClick={e => e.stopPropagation()}>
                                <div className="bg-gradient-to-br from-yellow-600 to-amber-700 p-8 text-center">
                                    <h2 className="text-3xl font-black text-white">🏆board</h2>
                                    <div className="mt-2 py-1 px-3 bg-black/30 rounded-full inline-block border border-white/20 animate-pulse-custom">
                                        <p className="text-[10px] text-yellow-200 font-bold uppercase tracking-widest">
                                            ⚠️ บั๊กอยู่: คะแนนบันทึกเฉพาะเครื่องนี้เท่านั้น
                                        </p>
                                    </div>
                                </div>
                                <div className="p-4 space-y-2 max-h-[50vh] overflow-y-auto custom-scroll">
                                    {leaderboard.length > 0 ? leaderboard.map((e, i) => (
                                        <div key={e.id} className={`flex items-center justify-between p-4 rounded-2xl ${e.id === lastGameSession ? 'bg-blue-500/20 border border-blue-400' : 'bg-white/5'}`}>
                                            <div className="flex items-center gap-4">
                                                <span className="font-black text-slate-500 w-6">{i+1}</span>
                                                <p className="font-bold text-white">{e.name}</p>
                                            </div>
                                            <p className="text-xl font-black text-yellow-500">{e.score}</p>
                                        </div>
                                    )) : <p className="text-center py-10 opacity-30 font-bold italic">No records yet...</p>}
                                </div>
                                <div className="p-6 bg-slate-900/50">
                                    <button onClick={() => setShowRanking(false)} className="w-full py-4 bg-slate-800 rounded-2xl font-black text-white hover:bg-slate-700 btn-bounce">CLOSE</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* VIEW: PLAYING */}
                    {view === 'PLAY' && (
                        <div className="w-full max-w-xl text-center">
                            <div className="flex justify-between mb-8 px-6 items-end">
                                <div className="text-left">
                                    <p className="text-xs text-blue-400 font-black uppercase opacity-50">Score</p>
                                    <h3 className="text-4xl font-black">{score}</h3>
                                </div>
                                <div className="text-right">
                                    <p className="text-xs text-red-500 font-black uppercase opacity-50">Streak</p>
                                    <h3 className="text-4xl font-black text-red-500">🔥 {streak}</h3>
                                </div>
                            </div>
                            <div className={`glass-dark p-12 rounded-[4rem] border border-white/5 ${transitionClass}`}>
                                <h2 className="text-4xl md:text-6xl font-black mb-16 tracking-tighter">{currentWord}</h2>
                                <div className="grid gap-4">
                                    {options.map((opt, i) => (
                                        <button key={i} disabled={answered} onClick={() => handleAnswer(opt)}
                                            className={`p-6 rounded-[2rem] border-2 font-bold text-xl transition-all ${
                                                answered 
                                                ? (opt === correctChoice ? 'bg-emerald-600 border-emerald-400 scale-[1.03]' : (opt === wrongChoice ? 'bg-red-600 border-red-400' : 'opacity-20')) 
                                                : 'bg-slate-800/40 border-slate-700 hover:border-blue-500 hover:bg-slate-800'
                                            }`}>{opt}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* VIEW: GAMEOVER */}
                    {view === 'GAMEOVER' && (
                        <div className="w-full max-w-md glass-dark p-12 rounded-[3.5rem] text-center border-4 border-red-600/50">
                            <h2 className="text-5xl font-black text-red-600 mb-2">GAME OVER</h2>
                            <div className="bg-slate-900/80 p-8 rounded-[2.5rem] my-8 border border-white/5">
                                <p className="text-slate-500 font-black mb-1 text-xs uppercase tracking-widest">Final Score</p>
                                <div className="text-8xl font-black text-blue-500">{score}</div>
                            </div>
                            <div className="grid gap-3">
                                <button onClick={() => setShowRanking(true)} className="w-full py-4 bg-slate-800 text-yellow-500 border border-yellow-500/30 rounded-2xl font-black text-xl btn-bounce">🏆 board</button>
                                <button onClick={startGame} className="w-full py-5 bg-red-600 text-white rounded-2xl font-black text-2xl shadow-lg btn-bounce">TRY AGAIN</button>
                                <button onClick={() => setView('MENU')} className="w-full py-4 bg-slate-800 text-white rounded-2xl font-black text-lg">MENU</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
