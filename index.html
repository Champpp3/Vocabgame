<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOCAB QUIZ - Advanced Leaderboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, query, orderByChild, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDoWDTu7AsocJiDO3pmmnt_mQuLVeCBHFE",
            authDomain: "vocab-fire-project.firebaseapp.com",
            databaseURL: "https://vocab-fire-project-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "vocab-fire-project",
            storageBucket: "vocab-fire-project.firebasestorage.app",
            messagingSenderId: "431918734336",
            appId: "1:431918734336:web:bb98ee795f635c0b09a259"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
        window.dbUtils = { ref, set, onValue, push, query, orderByChild, get };
    </script>

    <style>
        body { font-family: 'Kanit', sans-serif; transition: all 0.3s ease; overflow: hidden; }
        .theme-dark { background: #020617; color: white; }
        .theme-dark .glass { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.1); }
        .theme-light { background: #f0f9ff; color: #0f172a; }
        .theme-light .glass { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(0,0,0,0.1); }
        .btn-primary { background: linear-gradient(to right, #0284c7, #06b6d4); color: white; transition: transform 0.1s; }
        .btn-primary:active { transform: scale(0.95); }
        .anim-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="theme-dark">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const FULL_VOCAB = { "Affectionate": "เมตตา/รักใคร่", "adorable": "น่ารัก", "amicable": "เป็นมิตร", "outstanding": "โดดเด่น", "exceptional": "ยอดเยี่ยม", "privileges": "สิทธิพิเศษ", "proposal": "ข้อเสนอ", "approach": "แนวทาง", "contributing": "การมีส่วนร่วม", "appreciate": "เห็นคุณค่า" };

        function App() {
            const [view, setView] = useState('MENU');
            const [isDark, setIsDark] = useState(true);
            const [showSetting, setShowSetting] = useState(false);
            const [showRanking, setShowRanking] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [volume, setVolume] = useState(0.5);
            const [playerName, setPlayerName] = useState('');
            const [finalName, setFinalName] = useState('');
            const [score, setScore] = useState(0);
            const [currentWord, setCurrentWord] = useState(null);
            const [options, setOptions] = useState([]);
            const [answered, setAnswered] = useState(false);
            const [correctChoice, setCorrectChoice] = useState(null);
            const [globalBoard, setGlobalBoard] = useState([]);
            const [currentRank, setCurrentRank] = useState(0);

            const bgMusicRef = useRef(null);
            const gameOverSoundRef = useRef(null);

            useEffect(() => {
                document.body.className = isDark ? 'theme-dark' : 'theme-light';
            }, [isDark]);

            // ติดตามข้อมูล Leaderboard ตลอดเวลา
            useEffect(() => {
                if (!window.db) return;
                const { ref, onValue, query, orderByChild } = window.dbUtils;
                const scoresRef = query(ref(window.db, 'scores'), orderByChild('score'));
                onValue(scoresRef, (snap) => {
                    if (snap.val()) {
                        const data = Object.values(snap.val()).sort((a, b) => b.score - a.score);
                        setGlobalBoard(data);
                    }
                });
            }, []);

            // ระบบตรวจสอบและรันเลขชื่อซ้ำ
            const resolveName = async (name) => {
                const { ref, get, query } = window.dbUtils;
                const snap = await get(ref(window.db, 'scores'));
                if (!snap.exists()) return name;
                
                const existingNames = Object.values(snap.val()).map(item => item.name);
                if (!existingNames.includes(name)) return name;

                let count = 1;
                while (existingNames.includes(`${name} ${count}`)) {
                    count++;
                }
                return `${name} ${count}`;
            };

            const startGame = async () => {
                if (!playerName.trim()) return alert("กรุณาใส่ชื่อก่อนครับ");
                const uniqueName = await resolveName(playerName.trim());
                setFinalName(uniqueName);
                setView('PLAY');
                setScore(0);
                nextQuestion();
                if (bgMusicRef.current) bgMusicRef.current.play();
            };

            const nextQuestion = () => {
                const keys = Object.keys(FULL_VOCAB);
                const word = keys[Math.floor(Math.random() * keys.length)];
                const correct = FULL_VOCAB[word];
                let choices = [correct];
                while(choices.length < 4) {
                    const r = Object.values(FULL_VOCAB)[Math.floor(Math.random() * Object.keys(FULL_VOCAB).length)];
                    if(!choices.includes(r)) choices.push(r);
                }
                setOptions(choices.sort(() => Math.random() - 0.5));
                setCurrentWord(word);
                setCorrectChoice(correct);
                setAnswered(false);
            };

            const handleAnswer = (choice) => {
                if (answered) return;
                setAnswered(true);
                if (choice === correctChoice) {
                    setScore(s => s + 1);
                    setTimeout(nextQuestion, 600);
                } else {
                    if (bgMusicRef.current) bgMusicRef.current.pause();
                    if (gameOverSoundRef.current) {
                        gameOverSoundRef.current.volume = volume;
                        gameOverSoundRef.current.play();
                    }
                    
                    // บันทึกและคำนวณอันดับทันที
                    const newScoreData = { name: finalName, score, timestamp: Date.now() };
                    const { ref, push, set } = window.dbUtils;
                    if (score > 0) set(push(ref(window.db, 'scores')), newScoreData);
                    
                    // คำนวณอันดับปัจจุบัน (รวมคะแนนล่าสุดเข้าไปด้วย)
                    const tempBoard = [...globalBoard, newScoreData].sort((a, b) => b.score - a.score);
                    const rank = tempBoard.findIndex(item => item.name === finalName && item.score === score) + 1;
                    setCurrentRank(rank);
                    
                    setTimeout(() => setView('GAMEOVER'), 1000);
                }
            };

            const filteredBoard = useMemo(() => {
                return globalBoard.filter(item => 
                    item.name.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [globalBoard, searchTerm]);

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <audio ref={bgMusicRef} loop src="bgm.mp3" />
                    <audio ref={gameOverSoundRef} src="gameover.mp3" />

                    <button onClick={() => setShowSetting(true)} className="fixed top-6 left-6 z-50 w-12 h-12 glass rounded-full flex items-center justify-center text-xl">⚙️</button>

                    {view === 'MENU' && (
                        <div className="w-full max-w-md glass p-12 rounded-[3rem] text-center anim-in">
                            <h1 className="text-5xl font-black italic mb-2 text-sky-500">VOCAB</h1>
                            <h1 className="text-4xl font-black mb-10 tracking-widest uppercase">QUIZ</h1>
                            <input className="w-full p-5 bg-white/5 rounded-2xl mb-6 text-center text-xl font-bold border border-white/10 outline-none" placeholder="ชื่อผู้เล่น" value={playerName} onChange={e => setPlayerName(e.target.value)} />
                            <button onClick={startGame} className="w-full py-5 btn-primary rounded-3xl font-black text-2xl shadow-lg">Play</button>
                            <button onClick={() => setShowRanking(true)} className="mt-6 text-yellow-500 hover:text-yellow-400 font-black block mx-auto uppercase text-sm tracking-widest drop-shadow-[0_0_8px_rgba(234,179,8,0.5)] transition-all">✨ ค้นหาอันดับ ✨</button>
                        </div>
                    )}

                    {view === 'PLAY' && (
                        <div className="w-full max-w-xl text-center anim-in">
                            <div className="flex justify-between items-center mb-8 px-4">
                                <div className="text-xl font-bold opacity-50">{finalName}</div>
                                <div className="text-3xl font-black text-sky-500">SCORE: {score}</div>
                            </div>
                            <div className="glass p-12 rounded-[3rem]">
                                <h2 className="text-5xl font-black mb-12">{currentWord}</h2>
                                <div className="grid gap-4">
                                    {options.map((opt, i) => (
                                        <button key={i} onClick={() => handleAnswer(opt)} className={`p-6 rounded-2xl border-2 font-bold text-xl transition-all ${answered ? (opt === correctChoice ? 'bg-emerald-500 border-emerald-400 text-white' : 'opacity-20') : 'hover:border-sky-500'}`}>{opt}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'GAMEOVER' && (
                        <div className="w-full max-w-md glass p-12 rounded-[3rem] text-center anim-in border-4 border-red-500/20">
                            <h2 className="text-3xl font-black text-red-500 mb-2">GAME OVER</h2>
                            <div className="text-7xl font-black mb-2 text-sky-500">{score}</div>
                            <div className="text-xl font-bold mb-10 text-slate-400 font-italic">คุณอยู่อันดับที่ #{currentRank} ในปัจจุบัน</div>
                            <button onClick={startGame} className="w-full py-5 btn-primary rounded-2xl font-black text-2xl mb-4">เล่นอีกครั้ง</button>
                            <button onClick={() => setView('MENU')} className="text-slate-400 font-bold block mx-auto">กลับหน้าเมนู</button>
                        </div>
                    )}

                    {/* Setting Popup */}
                    {showSetting && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm" onClick={() => setShowSetting(false)}>
                            <div className="w-80 glass p-8 rounded-3xl" onClick={e => e.stopPropagation()}>
                                <h3 className="text-xl font-bold mb-6 text-center">Settings</h3>
                                <div className="flex justify-between items-center mb-6">
                                    <span>Theme</span>
                                    <button onClick={() => setIsDark(!isDark)} className="p-2 bg-white/10 rounded-lg">{isDark ? '🌙 Dark' : '☀️ Light'}</button>
                                </div>
                                <div className="mb-8">
                                    <label className="text-xs text-slate-400 mb-2 block">Volume Control</label>
                                    <input type="range" min="0" max="1" step="0.1" value={volume} onChange={e => setVolume(e.target.value)} className="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer" />
                                </div>
                                <button onClick={() => setShowSetting(false)} className="w-full py-3 bg-white/10 rounded-xl font-bold">Close</button>
                            </div>
                        </div>
                    )}

                    {/* Leaderboard Popup with Search */}
                    {showRanking && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 p-4 anim-in" onClick={() => setShowRanking(false)}>
                            <div className="w-full max-w-md glass rounded-[3rem] overflow-hidden flex flex-col h-[80vh]" onClick={e => e.stopPropagation()}>
                                <div className="bg-sky-600 p-6 text-center text-white font-black text-2xl italic">Leaderboard</div>
                                <div className="p-4 bg-white/5">
                                    <input className="w-full p-3 bg-white/10 rounded-xl outline-none border border-white/10 text-center" placeholder="🔍 ค้นหาชื่อผู้เล่น..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-2">
                                    {filteredBoard.length > 0 ? filteredBoard.map((e, i) => (
                                        <div key={i} className="flex justify-between p-4 bg-white/5 rounded-2xl border border-white/5">
                                            <div className="font-bold flex items-center">
                                                <span className={`w-8 h-8 rounded-full flex items-center justify-center mr-3 text-xs ${i < 3 ? 'bg-sky-500 text-white' : 'bg-white/10'}`}>{i+1}</span>
                                                {e.name}
                                            </div>
                                            <div className="text-sky-400 font-black">{e.score}</div>
                                        </div>
                                    )) : <div className="text-center p-10 opacity-50 italic">ไม่พบชื่อที่คุณค้นหา</div>}
                                </div>
                                <div className="p-6"><button onClick={() => setShowRanking(false)} className="w-full py-4 bg-white/5 rounded-2xl font-bold">ปิดหน้าต่าง</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
