<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOCAB QUIZ</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <!-- Firebase SDK (Config เดิมของคุณ) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        const firebaseConfig = {
            apiKey: "AIzaSyDoWDTu7AsocJiDO3pmmnt_mQuLVeCBHFE",
            authDomain: "vocab-fire-project.firebaseapp.com",
            databaseURL: "https://vocab-fire-project-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "vocab-fire-project",
            storageBucket: "vocab-fire-project.firebasestorage.app",
            messagingSenderId: "431918734336",
            appId: "1:431918734336:web:bb98ee795f635c0b09a259"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
        window.dbUtils = { ref, set, onValue, push, query, orderByChild, limitToLast };
    </script>
    <style>
        body { font-family: 'Kanit', sans-serif; transition: all 0.3s ease; overflow: hidden; }
        /* Theme Styles */
        .theme-dark { background: #020617; color: white; }
        .theme-dark .glass { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.1); }
        
        .theme-light { background: #f0f9ff; color: #0f172a; } /* ฟ้าอ่อนขาว */
        .theme-light .glass { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(0,0,0,0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .theme-light .text-primary { color: #0284c7; }
        
        .btn-primary { background: linear-gradient(to right, #0284c7, #06b6d4); color: white; }
        .anim-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="theme-dark">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const FULL_VOCAB = { /* ข้อมูลคำศัพท์ของคุณ */ "Affectionate": "เมตตา/รักใคร่", "adorable": "น่ารัก", "amicable": "เป็นมิตร", "outstanding": "โดดเด่น", "exceptional": "ยอดเยี่ยม", "privileges": "สิทธิพิเศษ", "proposal": "ข้อเสนอ", "approach": "แนวทาง", "contributing": "การมีส่วนร่วม", "appreciate": "เห็นคุณค่า" };

        function App() {
            const [view, setView] = useState('MENU');
            const [isDark, setIsDark] = useState(true);
            const [showSetting, setShowSetting] = useState(false);
            const [showInfo, setShowInfo] = useState(false);
            const [volume, setVolume] = useState(0.5);
            const [playerName, setPlayerName] = useState('');
            const [score, setScore] = useState(0);
            const [currentWord, setCurrentWord] = useState(null);
            const [options, setOptions] = useState([]);
            const [answered, setAnswered] = useState(false);
            const [correctChoice, setCorrectChoice] = useState(null);

            const bgMusicRef = useRef(null);
            const gameOverSoundRef = useRef(null);

            useEffect(() => {
                document.body.className = isDark ? 'theme-dark' : 'theme-light';
            }, [isDark]);

            const nextQuestion = () => {
                const keys = Object.keys(FULL_VOCAB);
                const word = keys[Math.floor(Math.random() * keys.length)];
                const correct = FULL_VOCAB[word];
                let choices = [correct];
                while(choices.length < 4) {
                    const r = Object.values(FULL_VOCAB)[Math.floor(Math.random() * 10)];
                    if(!choices.includes(r)) choices.push(r);
                }
                setOptions(choices.sort(() => Math.random() - 0.5));
                setCurrentWord(word);
                setCorrectChoice(correct);
                setAnswered(false);
            };

            const handleAnswer = (choice) => {
                if (answered) return;
                setAnswered(true);
                if (choice === correctChoice) {
                    setScore(s => s + 1);
                    setTimeout(nextQuestion, 600);
                } else {
                    if (bgMusicRef.current) bgMusicRef.current.pause();
                    if (gameOverSoundRef.current) {
                        gameOverSoundRef.current.volume = volume;
                        gameOverSoundRef.current.play();
                    }
                    setTimeout(() => setView('GAMEOVER'), 1000);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <audio ref={bgMusicRef} loop src="bgm.mp3" />
                    <audio ref={gameOverSoundRef} src="gameover.mp3" />

                    <button onClick={() => setShowSetting(true)} className="fixed top-6 left-6 z-50 w-12 h-12 glass rounded-full flex items-center justify-center text-xl">⚙️</button>

                    {view === 'MENU' && (
                        <div className="w-full max-w-md glass p-12 rounded-[3rem] text-center anim-in">
                            <h1 className="text-5xl font-black italic mb-2 text-primary">VOCAB</h1>
                            <h1 className="text-4xl font-black mb-10 tracking-widest uppercase">QUIZ</h1>
                            <input className="w-full p-5 bg-white/5 rounded-2xl mb-6 text-center text-xl font-bold border border-white/10 outline-none" placeholder="ใส่ชื่อของคุณ" value={playerName} onChange={e => setPlayerName(e.target.value)} />
                            <button onClick={() => { if(playerName) { setView('PLAY'); nextQuestion(); bgMusicRef.current.play(); } }} className="w-full py-5 btn-primary rounded-3xl font-black text-2xl shadow-lg">Play</button>
                        </div>
                    )}

                    {view === 'PLAY' && (
                        <div className="w-full max-w-xl text-center anim-in">
                            <div className="text-3xl font-black mb-8 text-sky-500">SCORE: {score}</div>
                            <div className="glass p-12 rounded-[3rem]">
                                <h2 className="text-5xl font-black mb-12">{currentWord}</h2>
                                <div className="grid gap-4">
                                    {options.map((opt, i) => (
                                        <button key={i} onClick={() => handleAnswer(opt)} className={`p-6 rounded-2xl border-2 font-bold text-xl transition-all ${answered ? (opt === correctChoice ? 'bg-emerald-500 border-emerald-400 text-white' : 'opacity-20') : 'hover:border-sky-500'}`}>{opt}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'GAMEOVER' && (
                        <div className="w-full max-w-md glass p-12 rounded-[3rem] text-center anim-in">
                            <h2 className="text-4xl font-black text-red-500 mb-4">GAME OVER</h2>
                            <div className="text-7xl font-black mb-10">{score}</div>
                            <button onClick={() => { setScore(0); setView('PLAY'); nextQuestion(); bgMusicRef.current.play(); }} className="w-full py-5 btn-primary rounded-2xl font-black text-2xl">Restart</button>
                        </div>
                    )}

                    {showSetting && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm" onClick={() => setShowSetting(false)}>
                            <div className="w-80 glass p-8 rounded-3xl" onClick={e => e.stopPropagation()}>
                                <h3 className="text-xl font-bold mb-6 text-center">Settings</h3>
                                <div className="flex justify-between items-center mb-6">
                                    <span>Theme</span>
                                    <button onClick={() => setIsDark(!isDark)} className="p-2 bg-white/10 rounded-lg">{isDark ? '🌙 Dark' : '☀️ Light'}</button>
                                </div>
                                <div className="mb-6">
                                    <label className="text-xs text-slate-400">Volume</label>
                                    <input type="range" min="0" max="1" step="0.1" value={volume} onChange={e => setVolume(e.target.value)} className="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer" />
                                </div>
                                <button onClick={() => { setShowSetting(false); setShowInfo(true); }} className="w-full py-2 mb-4 text-sm bg-white/5 rounded-lg">❓ ข้อมูลผู้สร้าง (AI)</button>
                                <button onClick={() => setShowSetting(false)} className="w-full py-3 bg-white/10 rounded-xl font-bold">Close</button>
                            </div>
                        </div>
                    )}

                    {showInfo && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center bg-black/80" onClick={() => setShowInfo(false)}>
                            <div className="max-w-xs glass p-8 rounded-3xl text-center" onClick={e => e.stopPropagation()}>
                                <div className="text-4xl mb-4">🤖</div>
                                <p className="mb-6">เกมนี้สร้างด้วยความช่วยเหลือของ **Gemini 1.5 Pro** ในการเขียนโค้ดและออกแบบระบบ</p>
                                <button onClick={() => setShowInfo(false)} className="px-8 py-2 bg-sky-500 rounded-full font-bold">โอเค</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
