        function App() {
            const [view, setView] = useState('MENU');
            const [showRanking, setShowRanking] = useState(false);
            const [playerName, setPlayerName] = useState('');
            const [currentWord, setCurrentWord] = useState(null);
            const [options, setOptions] = useState([]);
            const [score, setScore] = useState(0);
            const [streak, setStreak] = useState(0);
            const [answered, setAnswered] = useState(false);
            const [wrongChoice, setWrongChoice] = useState(null);
            const [correctChoice, setCorrectChoice] = useState(null);
            const [transitionClass, setTransitionClass] = useState('anim-in');
            const [globalBoard, setGlobalBoard] = useState([]);

            // ดึงข้อมูล Leaderboard จาก Firebase
            useEffect(() => {
                if (!window.db) return;
                const { ref, onValue, query, orderByChild, limitToLast } = window.dbUtils;
                const scoresRef = query(ref(window.db, 'scores'), orderByChild('score'), limitToLast(50));
                
                onValue(scoresRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const sorted = Object.values(data).sort((a, b) => b.score - a.score);
                        setGlobalBoard(sorted);
                    }
                });
            }, [view, showRanking]);

            const nextQuestion = () => {
                const words = Object.keys(FULL_VOCAB);
                const word = words[Math.floor(Math.random() * words.length)];
                const correct = FULL_VOCAB[word];
                const allMeanings = Object.values(FULL_VOCAB);
                let distractors = allMeanings.filter(t => t !== correct);
                let choices = [];
                while (choices.length < 3) {
                    const r = distractors[Math.floor(Math.random() * distractors.length)];
                    if (!choices.includes(r)) choices.push(r);
                }
                setOptions([...choices, correct].sort(() => Math.random() - 0.5));
                setCurrentWord(word);
                setCorrectChoice(correct);
                setAnswered(false);
                setWrongChoice(null);
                setTransitionClass('anim-in');
            };

            const startGame = () => {
                if (!playerName.trim()) return alert("กรุณาใส่ชื่อ!");
                setScore(0);
                setStreak(0);
                setView('PLAY');
                nextQuestion();
            };

            const handleAnswer = (choice) => {
                if (answered) return;
                setAnswered(true);
                if (choice === correctChoice) {
                    setScore(s => s + 10);
                    setStreak(p => p + 1);
                    setTimeout(() => {
                        setTransitionClass('anim-out');
                        setTimeout(nextQuestion, 400);
                    }, 600);
                } else {
                    setWrongChoice(choice);
                    // บันทึกคะแนนลง Firebase ทันทีเมื่อเกมโอเวอร์
                    if (score > 0) {
                        const { ref, push, set } = window.dbUtils;
                        const newScoreRef = push(ref(window.db, 'scores'));
                        set(newScoreRef, {
                            name: playerName,
                            score: score,
                            timestamp: Date.now()
                        });
                    }
                    setTimeout(() => setView('GAMEOVER'), 1000);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    {view === 'MENU' && (
                        <div className="w-full max-w-md glass-dark p-12 rounded-[3rem] text-center border border-white/10">
                            <h1 className="text-5xl font-black text-blue-500 italic mb-2">VOCAB</h1>
                            <h1 className="text-4xl font-black text-red-500 mb-10 tracking-widest">FIRE 🔥</h1>
                            <input className="w-full p-5 bg-slate-900/50 rounded-2xl mb-6 text-center text-xl font-bold border border-white/10 outline-none focus:ring-2 ring-red-500" placeholder="ชื่อเล่นของคุณ" value={playerName} onChange={e => setPlayerName(e.target.value)}/>
                            <button onClick={startGame} className="w-full py-5 bg-gradient-to-r from-red-600 to-orange-500 text-white rounded-3xl font-black text-2xl btn-bounce">PLAY GLOBAL</button>
                            <button onClick={() => setShowRanking(true)} className="mt-4 text-yellow-500 font-bold uppercase tracking-widest text-sm underline">View Global Leaderboard</button>
                        </div>
                    )}

                    {showRanking && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-md p-4" onClick={() => setShowRanking(false)}>
                            <div className="w-full max-w-md glass-dark rounded-[3.5rem] overflow-hidden border border-white/10" onClick={e => e.stopPropagation()}>
                                <div className="bg-yellow-600 p-8 text-center text-white font-black text-3xl italic tracking-tighter">🏆 GLOBAL BOARD</div>
                                <div className="p-4 space-y-2 max-h-[50vh] overflow-y-auto custom-scroll">
                                    {globalBoard.map((e, i) => (
                                        <div key={i} className="flex justify-between p-4 bg-white/5 rounded-2xl">
                                            <div className="flex gap-4 font-bold text-lg"><span className="text-slate-500">#{i+1}</span> {e.name}</div>
                                            <div className="text-yellow-500 font-black text-xl">{e.score}</div>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-6"><button onClick={() => setShowRanking(false)} className="w-full py-4 bg-slate-800 rounded-2xl font-black text-white">CLOSE</button></div>
                            </div>
                        </div>
                    )}

                    {view === 'PLAY' && (
                        <div className="w-full max-w-xl text-center">
                            <div className="flex justify-between mb-8 px-6 font-black text-xl">
                                <div className="text-blue-500">SCORE: {score}</div>
                                <div className="text-red-500">🔥 {streak}</div>
                            </div>
                            <div className={`glass-dark p-12 rounded-[4rem] ${transitionClass}`}>
                                <h2 className="text-5xl md:text-7xl font-black mb-16">{currentWord}</h2>
                                <div className="grid gap-4">
                                    {options.map((opt, i) => (
                                        <button key={i} onClick={() => handleAnswer(opt)} className={`p-6 rounded-[2rem] border-2 font-bold text-xl ${answered ? (opt === correctChoice ? 'bg-emerald-600 border-emerald-400' : (opt === wrongChoice ? 'bg-red-600 border-red-400' : 'opacity-20')) : 'bg-slate-800/40 border-slate-700'}`}>{opt}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'GAMEOVER' && (
                        <div className="w-full max-w-md glass-dark p-12 rounded-[3.5rem] text-center border-4 border-red-600/50">
                            <h2 className="text-5xl font-black text-red-600">GAME OVER</h2>
                            <div className="text-8xl font-black text-blue-500 my-10">{score}</div>
                            <button onClick={startGame} className="w-full py-5 bg-red-600 text-white rounded-2xl font-black text-2xl btn-bounce">TRY AGAIN</button>
                            <button onClick={() => setView('MENU')} className="mt-4 text-slate-500 font-bold uppercase tracking-widest text-sm">Main Menu</button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App/>);
    </script>
</body>
</html>
