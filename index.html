    {w: "evaporate", m: "ระเหย"}, {w: "contamination", m: "การปนเปื้อน"}, {w: "disrupt", m: "ขัดขวาง"},
    {w: "phase out", m: "ค่อยๆ ยกเลิก"}, {w: "treaty", m: "สนธิสัญญา"}, {w: "cooperative", m: "ร่วมมือกัน"},
    {w: "obstructive", m: "ขัดขวาง"}, {w: "manipulative", m: "ซึ่งบงการ"}, {w: "trivial", m: "ไม่สำคัญ"},
    {w: "menace", m: "ภัยคุกคาม"}, {w: "threat", m: "การคุกคาม"}, {w: "enacted", m: "ออกกฎหมาย"},
    {w: "incident", m: "เหตุการณ์"}, {w: "grander", m: "ยิ่งใหญ่กว่า"}, {w: "condense", m: "ควบแน่น"},
    {w: "globe", m: "โลก"}, {w: "gather", m: "รวบรวม"}, {w: "saturated", m: "อิ่มตัว"},
    {w: "journal", m: "วารสาร/บันทึก"}, {w: "ruins", m: "ซากปรักหักพัง"}, {w: "beholding", m: "จ้องมอง"},
    {w: "embark", m: "เริ่มดำเนินการ/ขึ้นเรือ"}, {w: "invention", m: "นวัตกรรม/การประดิษฐ์"}, {w: "sublime", m: "ล้ำเลิศ"},
    {w: "proportion", m: "สัดส่วน"},

    // --- Day 10 ---
    {w: "rearrange", m: "จัดเตรียมใหม่"}, {w: "chubby", m: "จ้ำม่ำ"}, {w: "stout", m: "อ้วนเตี้ย"},
    {w: "obese", m: "อ้วนเกินไป"}, {w: "meager", m: "ขาดแคลน"}, {w: "mercifully", m: "อย่างเมตตา"},
    {w: "savage", m: "โหดร้าย"}, {w: "benevolent", m: "เมตตา"}, {w: "compassionate", m: "เห็นอกเห็นใจ"},
    {w: "vulnerable", m: "อ่อนแอ/เสี่ยง"}, {w: "immune", m: "มีภูมิคุ้มกัน"}, {w: "susceptible", m: "อ่อนไหวง่าย"},
    {w: "supposition", m: "ข้อสมมติ"}, {w: "presumption", m: "การทึกทัก"}, {w: "contingency", m: "เหตุการณ์ฉุกเฉิน"},
    {w: "rage", m: "ความโกรธ"}, {w: "wrath", m: "ความพิโรธ"}, {w: "felicity", m: "ความสุขสำราญ"},
    {w: "industrious", m: "ขยัน"}, {w: "idle", m: "เกียจคร้าน/ว่างเปล่า"}, {w: "impartial", m: "เป็นกลาง"},
    {w: "biased", m: "มีอคติ"}, {w: "austere", m: "เคร่งครัด/เรียบง่าย"}, {w: "hospitable", m: "มีอัธยาศัยดี"},
    {w: "gracious", m: "สง่างาม/ใจดี"}, {w: "strict", m: "เข้มงวด"}, {w: "gauntlet", m: "ถุงมือป้องกัน"},
    {w: "crumb", m: "เศษขนม"}, {w: "splinter", m: "เสี้ยน/เศษไม้"}, {w: "temptation", m: "การล่อใจ"},
    {w: "diffusion", m: "การแพร่"}, {w: "behave", m: "ประพฤติตัว"}, {w: "improvise", m: "ด้นสด"},
    {w: "frustrated", m: "หงุดหงิด/ท้อแท้"}, {w: "dissatisfied", m: "ไม่พอใจ"}, {w: "surrounding", m: "รอบข้าง"},
    {w: "filthy", m: "สกปรก"}, {w: "hygienic", m: "ถูกสุขอนามัย"}, {w: "disinfected", m: "ฆ่าเชื้อแล้ว"},
    {w: "reservoir", m: "อ่างเก็บน้ำ"}, {w: "unusable", m: "ใช้งานไม่ได้"}, {w: "complaint", m: "การร้องเรียน"},
    {w: "ventilate", m: "ระบายอากาศ"}, {w: "capable", m: "มีความสามารถ"}, {w: "predated", m: "มีมาก่อน"},
    {w: "cereal", m: "ธัญพืช"}, {w: "upset", m: "เสียใจ/อารมณ์เสีย"}, {w: "opinions", m: "ความคิดเห็น"},
    {w: "opportunity", m: "โอกาส"}, {w: "in case", m: "ในกรณีที่"}, {w: "complicated", m: "ซับซ้อน"},
    {w: "surroundings", m: "สภาพแวดล้อม"}, {w: "basin", m: "อ่าง/ลุ่มน้ำ"}, {w: "a dam", m: "เขื่อน"},
    {w: "as a result", m: "ส่งผลให้"}, {w: "used as", m: "ใช้เป็น"}, {w: "crawl", m: "คลาน"},
    {w: "attic", m: "ห้องใต้หลังคา"}, {w: "steadily", m: "อย่างมั่นคง"}, {w: "render", m: "ทำให้เป็น"}
];

        // แก้ไข: สร้าง FULL_VOCAB จาก vocabList
        const FULL_VOCAB = vocabList.reduce((acc, curr) => {
            acc[curr.w] = curr.m;
            return acc;
        }, {});

        function App() {
            const [view, setView] = useState('MENU');
            const [isDark, setIsDark] = useState(true);
            const [showSetting, setShowSetting] = useState(false);
            const [showRanking, setShowRanking] = useState(false);
            const [showInfo, setShowInfo] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [volume, setVolume] = useState(0.5);
            const [playerName, setPlayerName] = useState('');
            const [finalName, setFinalName] = useState('');
            const [score, setScore] = useState(0);
            const [currentWord, setCurrentWord] = useState(null);
            const [options, setOptions] = useState([]);
            const [answered, setAnswered] = useState(false);
            const [correctChoice, setCorrectChoice] = useState(null);
            const [globalBoard, setGlobalBoard] = useState([]);
            const [currentRank, setCurrentRank] = useState(0);

            const bgMusicRef = useRef(null);
            const gameOverSoundRef = useRef(null);

            useEffect(() => {
                document.body.className = isDark ? 'theme-dark' : 'theme-light';
            }, [isDark]);

            useEffect(() => {
                if (!window.db) return;
                const { ref, onValue, query, orderByChild } = window.dbUtils;
                const scoresRef = query(ref(window.db, 'scores'), orderByChild('score'));
                onValue(scoresRef, (snap) => {
                    if (snap.val()) {
                        const data = Object.values(snap.val()).sort((a, b) => b.score - a.score);
                        setGlobalBoard(data);
                    }
                });
            }, []);

            const resolveName = async (name) => {
                const { ref, get } = window.dbUtils;
                const snap = await get(ref(window.db, 'scores'));
                if (!snap.exists()) return name;
                const existingNames = Object.values(snap.val()).map(item => item.name);
                if (!existingNames.includes(name)) return name;
                let count = 1;
                while (existingNames.includes(`${name} ${count}`)) { count++; }
                return `${name} ${count}`;
            };

            const nextQuestion = () => {
                const keys = Object.keys(FULL_VOCAB);
                const word = keys[Math.floor(Math.random() * keys.length)];
                const correct = FULL_VOCAB[word];
                let choices = [correct];
                while(choices.length < 4) {
                    const allMeanings = Object.values(FULL_VOCAB);
                    const r = allMeanings[Math.floor(Math.random() * allMeanings.length)];
                    if(!choices.includes(r)) choices.push(r);
                }
                setOptions(choices.sort(() => Math.random() - 0.5));
                setCurrentWord(word);
                setCorrectChoice(correct);
                setAnswered(false);
            };

            const startGame = async () => {
                if (!playerName.trim()) return alert("กรุณาใส่ชื่อก่อนครับ");
                const uniqueName = await resolveName(playerName.trim());
                setFinalName(uniqueName);
                setScore(0);
                nextQuestion();
                setView('PLAY');
                if (bgMusicRef.current) {
                    bgMusicRef.current.volume = volume;
                    bgMusicRef.current.play().catch(e => console.log("Music play blocked"));
                }
            };

            const handleAnswer = (choice) => {
                if (answered) return;
                setAnswered(true);
                if (choice === correctChoice) {
                    setScore(s => s + 1);
                    setTimeout(nextQuestion, 600);
                } else {
                    if (bgMusicRef.current) bgMusicRef.current.pause();
                    if (gameOverSoundRef.current) {
                        gameOverSoundRef.current.volume = volume;
                        gameOverSoundRef.current.play();
                    }
                    const newScoreData = { name: finalName, score, timestamp: Date.now() };
                    const { ref, push, set } = window.dbUtils;
                    if (score > 0) set(push(ref(window.db, 'scores')), newScoreData);
                    
                    const tempBoard = [...globalBoard, newScoreData].sort((a, b) => b.score - a.score);
                    const rank = tempBoard.findIndex(item => item.name === finalName && item.score === score) + 1;
                    setCurrentRank(rank || tempBoard.length);
                    setTimeout(() => setView('GAMEOVER'), 1000);
                }
            };

            const filteredBoard = useMemo(() => {
                return globalBoard.filter(item => 
                    item.name.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [globalBoard, searchTerm]);

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <audio ref={bgMusicRef} loop src="bgm.mp3" />
                    <audio ref={gameOverSoundRef} src="gameover.mp3" />

                    <button onClick={() => setShowSetting(true)} className="fixed top-6 left-6 z-50 w-12 h-12 glass rounded-full flex items-center justify-center text-xl">⚙️</button>

                    {view === 'MENU' && (
                        <div className="w-full max-w-md glass p-12 rounded-[3rem] text-center anim-in">
                            <h1 className="text-5xl font-black italic mb-2 text-sky-500">VOCAB</h1>
                            <h1 className="text-4xl font-black mb-10 tracking-widest uppercase">QUIZ</h1>
                            <input className="w-full p-5 bg-white/5 rounded-2xl mb-6 text-center text-xl font-bold border border-white/10 outline-none text-white" placeholder="ชื่อผู้เล่น" value={playerName} onChange={e => setPlayerName(e.target.value)} />
                            <button onClick={startGame} className="w-full py-5 btn-primary rounded-3xl font-black text-2xl shadow-lg">Play</button>
                            
                            <div className="mt-6 flex items-center justify-center gap-4">
                                <button onClick={() => setShowRanking(true)} className="font-black uppercase text-sm tracking-widest transition-all hover:scale-110 active:scale-95 bg-gradient-to-b from-yellow-200 via-yellow-500 to-amber-600 bg-clip-text text-transparent drop-shadow-[0_2px_4px_rgba(0,0,0,0.3)]">✨ ค้นหาอันดับ ✨</button>
                                <button onClick={() => setShowInfo(true)} className="w-8 h-8 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-slate-400 hover:text-white hover:bg-white/10 transition-all text-sm shadow-lg">?</button>
                            </div>
                        </div>
                    )}

                    {view === 'PLAY' && (
                        <div className="w-full max-w-xl text-center anim-in">
                            <div className="flex justify-between items-center mb-8 px-4 text-white">
                                <div className="text-xl font-bold opacity-50">{finalName}</div>
                                <div className="text-3xl font-black text-red-500">🔥SCORE: {score}</div>
                            </div>
                            <div className="glass p-12 rounded-[3rem]">
                                <h2 className="text-5xl font-black mb-12 text-white">{currentWord}</h2>
                                <div className="grid gap-4">
                                    {options.map((opt, i) => (
                                        <button key={i} onClick={() => handleAnswer(opt)} className={`p-6 rounded-2xl border-2 font-bold text-xl transition-all ${answered ? (opt === correctChoice ? 'bg-emerald-500 border-emerald-400 text-white' : 'opacity-20 text-white') : 'hover:border-sky-500 text-white'}`}>{opt}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'GAMEOVER' && (
                        <div className="w-full max-w-md glass p-12 rounded-[3rem] text-center anim-in border-4 border-red-500/20 text-white">
                            <h2 className="text-3xl font-black text-red-500 mb-2">GAME OVER</h2>
                            <div className="text-7xl font-black mb-2 text-sky-500">{score}</div>
                            <div className="text-xl font-bold mb-10 text-slate-400 font-italic">คุณอยู่อันดับที่ #{currentRank} ในปัจจุบัน</div>
                            <button onClick={startGame} className="w-full py-5 btn-primary rounded-2xl font-black text-2xl mb-4">เล่นอีกครั้ง</button>
                            <button onClick={() => setView('MENU')} className="text-slate-400 font-bold block mx-auto hover:text-white transition-colors">กลับหน้าเมนู</button>
                        </div>
                    )}

                    {/* Popups */}
                    {showSetting && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm text-white" onClick={() => setShowSetting(false)}>
                            <div className="w-80 glass p-8 rounded-3xl" onClick={e => e.stopPropagation()}>
                                <h3 className="text-xl font-bold mb-6 text-center text-white">Settings</h3>
                                <div className="flex justify-between items-center mb-6">
                                    <span>Theme</span>
                                    <button onClick={() => setIsDark(!isDark)} className="p-2 bg-white/10 rounded-lg">{isDark ? '🌙 Dark' : '☀️ Light'}</button>
                                </div>
                                <div className="mb-8">
                                    <label className="text-xs text-slate-400 mb-2 block">Volume Control</label>
                                    <input type="range" min="0" max="1" step="0.1" value={volume} onChange={e => setVolume(parseFloat(e.target.value))} className="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer" />
                                </div>
                                <button onClick={() => setShowSetting(false)} className="w-full py-3 bg-white/10 rounded-xl font-bold">Close</button>
                            </div>
                        </div>
                    )}

                    {showRanking && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 p-4 anim-in" onClick={() => setShowRanking(false)}>
                            <div className="w-full max-w-md glass rounded-[3rem] overflow-hidden flex flex-col h-[80vh] text-white" onClick={e => e.stopPropagation()}>
                                <div className="bg-sky-600 p-6 text-center text-white font-black text-2xl italic">Leaderboard</div>
                                <div className="p-4 bg-white/5">
                                    <input className="w-full p-3 bg-white/10 rounded-xl outline-none border border-white/10 text-center text-white" placeholder="🔍 ค้นหาชื่อผู้เล่น..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-2">
                                    {filteredBoard.length > 0 ? filteredBoard.map((e, i) => (
                                        <div key={i} className="flex justify-between p-4 bg-white/5 rounded-2xl border border-white/5">
                                            <div className="font-bold flex items-center">
                                                <span className={`w-8 h-8 rounded-full flex items-center justify-center mr-3 text-xs ${i < 3 ? 'bg-sky-500 text-white' : 'bg-white/10'}`}>{i+1}</span>
                                                {e.name}
                                            </div>
                                            <div className="text-sky-400 font-black">{e.score}</div>
                                        </div>
                                    )) : <div className="text-center p-10 opacity-50 italic">ไม่พบชื่อที่คุณค้นหา</div>}
                                </div>
                                <div className="p-6"><button onClick={() => setShowRanking(false)} className="w-full py-4 bg-white/5 rounded-2xl font-bold">ปิดหน้าต่าง</button></div>
                            </div>
                        </div>
                    )}

                    {showInfo && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center bg-black/80 backdrop-blur-md anim-in text-white" onClick={() => setShowInfo(false)}>
                            <div className="max-w-xs w-full glass p-8 rounded-[2.5rem] text-center border-t-2 border-sky-500/30" onClick={e => e.stopPropagation()}>
                                <div className="w-20 h-20 bg-gradient-to-br from-sky-400 to-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-[0_0_20px_rgba(56,189,248,0.4)] text-4xl">🤖</div>
                                <h3 className="text-xl font-black mb-2 text-sky-400 uppercase tracking-wider"></h3>
                                <p className="text-slate-300 leading-relaxed mb-8 text-sm">
                                     <span className="text-white font-bold"></span> <br/>
                                    ใช้ <span className="text-sky-400 font-bold">Gemini 3 Flash</span> <br/>
                                    ศัพท์จากข้อสอบ STEM
                                </p>
                                <button onClick={() => setShowInfo(false)} className="w-full py-3 bg-sky-500 hover:bg-sky-400 text-white rounded-2xl font-black transition-all shadow-lg active:scale-95">เข้าใจแล้ว</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
